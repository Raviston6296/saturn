# Saturn patch risk limits
#
# These limits prevent Saturn from making dangerously large or
# sensitive changes. If a patch violates these limits, the pipeline
# stops and requires human review.

version: 1

risk_limits:

  # Maximum number of files that can be changed in a single task
  max_files_changed: 30

  # Maximum number of lines (added + removed) in a single task
  max_lines_changed: 2000

# File path prefixes that Saturn must NOT touch
restricted_paths:

  - ".github/"
  - ".git/"

# Specific files that Saturn must NOT modify
restricted_files:

  - ".env"
  - "saturn.env.example"
  - "secrets.yaml"
  - "secrets.yml"
