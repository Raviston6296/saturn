# Saturn gates configuration for the Saturn repo itself (dogfooding)
#
# These gates run automatically after every code change to ensure
# the Saturn codebase stays healthy before creating a MR.
#
# Gate execution order matters — faster/cheaper gates run first.
# If a gate fails, Saturn will ask the agent to fix it and retry
# the entire pipeline from the beginning.

version: 1

gates:

  lint:
    description: "Check code style with ruff"
    command: "ruff check ."
    retryable: true

  tests:
    description: "Run the full pytest suite"
    command: "python -m pytest tests/ -x -q"
    retryable: true
